<div class="systems-container">
  <div class="header">
    <h1>Systems</h1>
    <button mat-raised-button color="primary" (click)="openDrawer()">
      <mat-icon>add</mat-icon>
      New System
    </button>
  </div>

  <mat-card class="filter-card">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Search</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Filter by name or ID..." />
      <mat-icon matPrefix>search</mat-icon>
    </mat-form-field>
  </mat-card>

  <mat-card class="table-card">
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" class="systems-table">
        <!-- Detail Column -->
        <ng-container matColumnDef="detail">
          <th mat-header-cell *matHeaderCellDef>詳細</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button (click)="viewDetail(element)" matTooltip="詳細ページへ">
              <mat-icon>add</mat-icon>
            </button>
          </td>
        </ng-container>

        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let element">{{ element.id }}</td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let element">{{ element.name }}</td>
        </ng-container>

        <!-- Department Column -->
        <ng-container matColumnDef="department">
          <th mat-header-cell *matHeaderCellDef>主管部門</th>
          <td mat-cell *matCellDef="let element">
            {{ element.department || '-' }}
          </td>
        </ng-container>

        <!-- Vendor Column -->
        <ng-container matColumnDef="vendor">
          <th mat-header-cell *matHeaderCellDef>開発ベンダー</th>
          <td mat-cell *matCellDef="let element">
            {{ element.vendor || '-' }}
          </td>
        </ng-container>

        <!-- Operations Vendor Column -->
        <ng-container matColumnDef="operationsVendor">
          <th mat-header-cell *matHeaderCellDef>運用ベンダー</th>
          <td mat-cell *matCellDef="let element">
            {{ element.operationsVendor || '-' }}
          </td>
        </ng-container>

        <!-- Criticality Column -->
        <ng-container matColumnDef="criticality">
          <th mat-header-cell *matHeaderCellDef>Criticality</th>
          <td mat-cell *matCellDef="let element">
            <mat-chip [ngClass]="'criticality-' + element.criticality.toLowerCase()">
              {{ element.criticality }}
            </mat-chip>
          </td>
        </ng-container>

        <!-- Last Updated Column -->
        <ng-container matColumnDef="lastUpdated">
          <th mat-header-cell *matHeaderCellDef>Last Updated</th>
          <td mat-cell *matCellDef="let element">
            {{ element.lastUpdated | date: 'yyyy-MM-dd' }}
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button (click)="openDrawer(element)" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button (click)="deleteSystem(element.id)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card>
</div>
